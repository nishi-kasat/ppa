name: Auto Deploy Placement Portal

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-session flask-cors redis celery werkzeug gunicorn

      - name: Verify backend compiles
        run: |
          python -m compileall backend

  deploy:
    needs: build-and-verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger hosting deploy hook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL secret is not set."
            echo "Create it in GitHub: Settings -> Secrets and variables -> Actions"
            exit 1
          fi

          curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"
          echo "Deployment webhook triggered successfully."
